<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สงกรานต์ปลอดภัย — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700;900&family=Kanit:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --gold:#FFD700;--gold2:#FFA500;--teal:#00C9FF;--teal2:#0077B6;
  --deep:#020B2D;--deep2:#030d38;--water:#90E0EF;--white:#fff;
  --red:#FF4757;--green:#2ED573;--orange:#FF6B35;
  --track-bg:#0a1628;--grass:#0d3320;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Prompt',sans-serif;background:var(--deep);color:#fff;overflow:hidden;}

/* BG */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 100% 50% at 10% 5%,rgba(0,180,216,.15) 0%,transparent 50%),
    radial-gradient(ellipse 80% 60% at 90% 95%,rgba(0,119,182,.18) 0%,transparent 50%),
    radial-gradient(ellipse 50% 40% at 50% 50%,rgba(255,215,0,.03) 0%,transparent 60%);}

/* LAYOUT */
.layout{position:relative;z-index:1;display:grid;grid-template-rows:auto 1fr auto;height:100vh;padding:12px 16px;gap:10px;}

/* TOP BAR */
.topbar{display:flex;align-items:center;gap:12px;padding:10px 18px;
  background:rgba(255,255,255,.06);border:1px solid rgba(0,201,255,.15);
  border-radius:16px;backdrop-filter:blur(12px);}
.topbar-logo{font-size:26px;filter:drop-shadow(0 0 10px rgba(0,201,255,.7));}
.topbar-title{font-family:'Kanit',sans-serif;font-size:18px;font-weight:900;
  background:linear-gradient(135deg,var(--gold),var(--orange),var(--teal));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.topbar-badge{padding:3px 10px;background:rgba(168,85,247,.2);border:1px solid rgba(168,85,247,.4);
  border-radius:99px;font-size:10px;color:#c084fc;font-weight:700;margin-left:4px;}
.topbar-spacer{flex:1;}
.topbar-stats{display:flex;gap:16px;align-items:center;}
.ts{text-align:center;}
.ts-v{font-family:'Kanit',sans-serif;font-size:20px;font-weight:900;color:var(--gold);line-height:1;}
.ts-l{font-size:9px;color:var(--water);opacity:.6;}
.live-pill{display:flex;align-items:center;gap:5px;padding:4px 12px;
  background:rgba(46,213,115,.1);border:1px solid rgba(46,213,115,.3);border-radius:99px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:livepulse 1.2s ease infinite;}
@keyframes livepulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
.live-txt{font-size:10px;color:var(--green);font-weight:700;}

/* MAIN AREA */
.main{display:grid;grid-template-columns:1fr 300px;gap:10px;overflow:hidden;}

/* ════ TRACK STADIUM ════ */
.stadium{background:var(--track-bg);border:1px solid rgba(0,201,255,.15);border-radius:20px;
  overflow:hidden;position:relative;display:flex;flex-direction:column;}

/* STADIUM HEADER */
.stadium-hdr{padding:10px 16px;background:rgba(0,0,0,.3);border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:space-between;}
.stadium-hdr-title{font-family:'Kanit',sans-serif;font-size:14px;font-weight:900;color:var(--gold);}

/* TRACK AREA */
.track-area{flex:1;padding:12px 16px;overflow-y:auto;display:flex;flex-direction:column;gap:0;}
.track-area::-webkit-scrollbar{width:3px;}
.track-area::-webkit-scrollbar-thumb{background:rgba(0,201,255,.3);border-radius:99px;}

/* LANE */
.lane{display:flex;align-items:center;gap:10px;padding:5px 0;position:relative;}
.lane-rank{width:28px;flex-shrink:0;text-align:center;font-size:13px;}
.lane-info{width:64px;flex-shrink:0;}
.lane-emp{font-size:11px;font-weight:700;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lane-score{font-family:'Kanit',sans-serif;font-size:10px;color:var(--gold);}

/* THE ACTUAL RUNNING TRACK */
.lane-track{flex:1;height:36px;position:relative;background:var(--track-bg);border-radius:8px;overflow:visible;}

/* Track surface */
.track-surface{position:absolute;inset:0;border-radius:8px;
  background:repeating-linear-gradient(90deg,rgba(255,255,255,.03) 0px,rgba(255,255,255,.03) 1px,transparent 1px,transparent 40px);
  border:1px solid rgba(255,255,255,.06);}

/* Progress fill */
.track-fill{position:absolute;left:0;top:4px;bottom:4px;border-radius:6px;
  transition:width .8s cubic-bezier(.4,0,.2,1);min-width:0px;}

/* Finish line */
.finish-line{position:absolute;right:0;top:-4px;bottom:-4px;width:8px;
  background:repeating-linear-gradient(180deg,#fff 0px,#fff 4px,#000 4px,#000 8px);
  border-radius:0 6px 6px 0;opacity:.6;}

/* Runner emoji */
.runner{position:absolute;top:50%;transform:translateY(-50%);
  font-size:22px;transition:left .8s cubic-bezier(.4,0,.2,1);
  filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));
  z-index:10;margin-left:-11px;pointer-events:none;}
.runner.finished{animation:runnerDance .5s ease infinite alternate;}
@keyframes runnerDance{0%{transform:translateY(-60%) scale(1)}100%{transform:translateY(-40%) scale(1.1)}}

/* Checkpoint marks */
.checkpoint{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,.1);}

/* Lane separator */
.lane-sep{height:1px;background:rgba(255,255,255,.04);margin:0 0 0 102px;}

/* Progress badge */
.lane-prog{width:36px;flex-shrink:0;text-align:right;}
.lp-val{font-size:10px;color:rgba(255,255,255,.4);}
.lp-fin{font-size:10px;color:var(--green);font-weight:700;}

/* ════ SIDEBAR ════ */
.sidebar{display:flex;flex-direction:column;gap:10px;overflow:hidden;}

/* LEADERBOARD */
.lb-card{background:rgba(255,255,255,.06);border:1px solid rgba(0,201,255,.15);
  border-radius:16px;padding:14px;backdrop-filter:blur(12px);flex:1;overflow:hidden;display:flex;flex-direction:column;}
.lb-card-title{font-family:'Kanit',sans-serif;font-size:14px;font-weight:900;
  background:linear-gradient(135deg,var(--gold),var(--orange));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px;}
.lb-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px;}
.lb-list::-webkit-scrollbar{width:3px;}
.lb-list::-webkit-scrollbar-thumb{background:rgba(0,201,255,.3);border-radius:99px;}
.lb-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:10px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05);
  transition:all .4s cubic-bezier(.4,0,.2,1);}
.lb-row.r1{background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,165,0,.08));border-color:rgba(255,215,0,.4);}
.lb-row.r2{background:rgba(192,192,192,.1);border-color:rgba(192,192,192,.25);}
.lb-row.r3{background:rgba(205,127,50,.1);border-color:rgba(205,127,50,.25);}
.lb-row.highlight{animation:rowPop .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes rowPop{0%{transform:scale(.97)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
.lb-rn{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;
  font-family:'Kanit',sans-serif;font-size:11px;font-weight:900;flex-shrink:0;}
.r1 .lb-rn{background:linear-gradient(135deg,#FFD700,#FFA500);color:#3d2000;}
.r2 .lb-rn{background:linear-gradient(135deg,#C0C0C0,#909090);color:#111;}
.r3 .lb-rn{background:linear-gradient(135deg,#CD7F32,#8B4513);color:#fff;}
.lb-rn.nr{background:rgba(255,255,255,.07);color:rgba(255,255,255,.4);font-size:10px;}
.lb-av{font-size:20px;flex-shrink:0;}
.lb-nm{flex:1;min-width:0;}
.lb-emp{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lb-sub{font-size:9px;color:var(--water);opacity:.55;}
.lb-sc{font-family:'Kanit',sans-serif;font-size:16px;font-weight:900;color:var(--gold);}
.lb-fin-badge{font-size:9px;padding:1px 5px;border-radius:99px;background:rgba(46,213,115,.2);color:var(--green);font-weight:700;}

/* STATS CARD */
.stats-card{background:rgba(255,255,255,.06);border:1px solid rgba(0,201,255,.15);
  border-radius:16px;padding:14px;backdrop-filter:blur(12px);}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sg{padding:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);border-radius:11px;text-align:center;}
.sg-v{font-family:'Kanit',sans-serif;font-size:20px;font-weight:900;line-height:1;}
.sg-l{font-size:9px;color:var(--water);opacity:.6;margin-top:2px;}

/* BOTTOM BAR */
.bottombar{display:flex;align-items:center;gap:10px;padding:8px 16px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:12px;}
.bb-time{font-size:11px;color:rgba(255,255,255,.3);}
.bb-spacer{flex:1;}
.btn-sm{padding:7px 16px;border:none;border-radius:9px;color:#fff;font-family:'Prompt',sans-serif;
  font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;background:rgba(255,71,87,.2);border:1px solid rgba(255,71,87,.3);}
.btn-sm:hover{background:rgba(255,71,87,.4);}
.btn-sm.teal{background:rgba(0,201,255,.15);border-color:rgba(0,201,255,.3);}
.btn-sm.teal:hover{background:rgba(0,201,255,.3);}

/* PODIUM (show when > 0 finished) */
.podium-strip{display:none;padding:10px 16px;background:rgba(255,215,0,.06);
  border-top:1px solid rgba(255,215,0,.15);align-items:center;gap:12px;}
.podium-strip.show{display:flex;}
.pod-item{display:flex;align-items:center;gap:6px;}
.pod-num{font-size:18px;}
.pod-av{font-size:20px;}
.pod-info{}.pod-emp{font-size:11px;font-weight:700;color:var(--gold);}
.pod-sc{font-size:10px;color:var(--water);opacity:.7;}
.pod-sep{width:1px;height:32px;background:rgba(255,255,255,.1);}

/* CONFETTI */
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden;}
.confetti-piece{position:absolute;width:8px;height:8px;animation:confettiFall linear forwards;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}

@media(max-width:900px){
  .main{grid-template-columns:1fr;}
  .sidebar{display:none;}
  html,body{overflow:auto;}
  .layout{height:auto;}
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="confetti-container" id="confettiC"></div>

<div class="layout">
  <!-- TOP BAR -->
  <div class="topbar">
    <span class="topbar-logo">💦</span>
    <div class="topbar-title">สงกรานต์ปลอดภัย</div>
    <span class="topbar-badge">👑 ADMIN</span>
    <div class="topbar-spacer"></div>
    <div class="topbar-stats">
      <div class="ts"><div class="ts-v" id="statTotal">0</div><div class="ts-l">ผู้เล่น</div></div>
      <div class="ts"><div class="ts-v" id="statFinished" style="color:var(--green)">0</div><div class="ts-l">เสร็จแล้ว</div></div>
      <div class="ts"><div class="ts-v" id="statAvgScore" style="color:var(--teal)">0</div><div class="ts-l">คะแนนเฉลี่ย</div></div>
      <div class="ts"><div class="ts-v" id="statTop" style="color:var(--orange)">0</div><div class="ts-l">คะแนนสูงสุด</div></div>
      <div class="live-pill"><div class="live-dot"></div><span class="live-txt">LIVE</span></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <!-- STADIUM / TRACK -->
    <div class="stadium">
      <div class="stadium-hdr">
        <div class="stadium-hdr-title">🏃 ลู่วิ่งแข่งขัน Real-time</div>
        <div style="font-size:10px;color:rgba(255,255,255,.35)" id="lastUpdate">—</div>
      </div>
      <!-- PODIUM STRIP -->
      <div class="podium-strip" id="podiumStrip"></div>
      <!-- TRACK LANES -->
      <div class="track-area" id="trackArea">
        <div style="text-align:center;padding:40px;color:rgba(255,255,255,.2);font-size:14px">
          ⏳ รอผู้เล่นเข้าร่วม...
        </div>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
      <!-- LEADERBOARD -->
      <div class="lb-card">
        <div class="lb-card-title">🏆 อันดับ Leaderboard</div>
        <div class="lb-list" id="lbList">
          <div style="text-align:center;padding:20px;color:rgba(255,255,255,.3);font-size:12px">รอผู้เล่น...</div>
        </div>
      </div>
      <!-- STATS -->
      <div class="stats-card">
        <div style="font-family:Kanit;font-size:13px;font-weight:900;color:var(--teal);margin-bottom:8px">📊 สถิติ</div>
        <div class="stats-grid">
          <div class="sg"><div class="sg-v" id="sg1" style="color:var(--green)">0%</div><div class="sg-l">ตอบถูกเฉลี่ย</div></div>
          <div class="sg"><div class="sg-v" id="sg2" style="color:var(--gold)">0</div><div class="sg-l">รหัสที่ใช้</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div class="bottombar">
    <div class="bb-time" id="bbTime">อัปเดตล่าสุด: —</div>
    <div class="bb-spacer"></div>
    <button class="btn-sm teal" onclick="forceRefresh()">🔄 รีเฟรช</button>
    <button class="btn-sm" onclick="confirmReset()">🗑️ ล้างข้อมูล</button>
  </div>
</div>

<script>
const SURL='https://iuxvvajeyqnnwwdyaudm.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1eHZ2YWpleXFubnd3ZHlhdWRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMDY1MDAsImV4cCI6MjA4ODc4MjUwMH0.AXDmUk3ovqECVRAypQtxufky8quH8Rc4uR8cGg3A8aU';
const sb=supabase.createClient(SURL,SKEY);

const MAX_SCORE=10000;
const LANE_COLORS=['#e63946','#2196F3','#FF9800','#4CAF50','#A855F7','#FF6B35','#00B4D8','#c084fc','#2ED573','#FF4757'];
const QS_COUNT=10;

let lastData=[];
let prevFinishedCount=0;

// ── INIT ──
async function init(){
  await refresh();
  subscribeRT();
}

function subscribeRT(){
  sb.channel('admin-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'game_results'},()=>refresh())
    .subscribe();
}

async function refresh(){
  const{data}=await sb.from('game_results')
    .select('emp_id,avatar,score,correct,wrong,finished,started_at,finished_at')
    .order('score',{ascending:false})
    .limit(10);
  if(!data)return;
  lastData=data;
  renderAll(data);
  updateTime();
}

function forceRefresh(){refresh();}

function renderAll(data){
  updateStats(data);
  renderTrack(data);
  renderLeaderboard(data);
  renderPodium(data);
  checkConfetti(data);
}

// ── STATS ──
function updateStats(data){
  const total=data.length;
  const finished=data.filter(d=>d.finished).length;
  const avgScore=total?Math.round(data.reduce((a,b)=>a+b.score,0)/total):0;
  const topScore=total?Math.max(...data.map(d=>d.score)):0;
  const totalQ=data.reduce((a,b)=>a+(b.correct||0)+(b.wrong||0),0);
  const totalOk=data.reduce((a,b)=>a+(b.correct||0),0);
  const acc=totalQ?Math.round(totalOk/totalQ*100):0;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statFinished').textContent=finished;
  document.getElementById('statAvgScore').textContent=avgScore;
  document.getElementById('statTop').textContent=topScore;
  document.getElementById('sg1').textContent=acc+'%';
  document.getElementById('sg2').textContent=total;
}

// ── TRACK ──
function renderTrack(data){
  const area=document.getElementById('trackArea');
  if(!data.length){
    area.innerHTML='<div style="text-align:center;padding:40px;color:rgba(255,255,255,.2);font-size:14px">⏳ รอผู้เล่นเข้าร่วม...</div>';
    return;
  }
  area.innerHTML='';
  const maxScore=Math.max(...data.map(d=>d.score),MAX_SCORE/10);

  data.forEach((p,i)=>{
    const pct=Math.min(98,Math.max(1,(p.score/MAX_SCORE)*96));
    const rank=i+1;
    const color=LANE_COLORS[i%LANE_COLORS.length];
    const rankIcon=rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':rank;
    const qDone=Math.min(QS_COUNT,(p.correct||0)+(p.wrong||0));
    const isFinished=p.finished;

    // Lane wrapper
    const lane=document.createElement('div');
    lane.className='lane';
    lane.id='lane-'+p.emp_id;

    // Checkpoints (every 10%)
    let checkpointsHtml='';
    for(let c=10;c<100;c+=10){
      checkpointsHtml+=`<div class="checkpoint" style="left:${c}%"></div>`;
    }

    lane.innerHTML=`
      <div class="lane-rank">${rankIcon}</div>
      <div class="lane-info">
        <div class="lane-emp" title="${p.emp_id}">${p.emp_id}</div>
        <div class="lane-score">${p.score} pts</div>
      </div>
      <div class="lane-track">
        <div class="track-surface"></div>
        ${checkpointsHtml}
        <div class="track-fill" id="fill-${p.emp_id}"
          style="width:${pct}%;background:linear-gradient(90deg,${color}88,${color});box-shadow:0 0 8px ${color}66;"></div>
        <div class="finish-line"></div>
        <span class="runner${isFinished?' finished':''}" id="runner-${p.emp_id}" style="left:${pct}%">${p.avatar||'🦁'}</span>
      </div>
      <div class="lane-prog">
        ${isFinished
          ?'<div class="lp-fin">✅ จบ</div>'
          :`<div class="lp-val">${qDone}/${QS_COUNT}</div>`
        }
      </div>
    `;
    area.appendChild(lane);

    // Lane separator
    if(i<data.length-1){
      const sep=document.createElement('div');sep.className='lane-sep';area.appendChild(sep);
    }
  });

  document.getElementById('lastUpdate').textContent='อัปเดต '+new Date().toLocaleTimeString('th-TH');
}

// ── LEADERBOARD ──
function renderLeaderboard(data){
  const el=document.getElementById('lbList');el.innerHTML='';
  if(!data.length){el.innerHTML='<div style="text-align:center;padding:20px;color:rgba(255,255,255,.3);font-size:12px">รอผู้เล่น...</div>';return;}
  data.forEach((p,i)=>{
    const rank=i+1;
    const rc=rank===1?'r1':rank===2?'r2':rank===3?'r3':'';
    const rnc=rank<=3?'':'nr';
    const icon=rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':rank;
    const d=document.createElement('div');
    d.className=`lb-row ${rc}`;
    d.id='lbrow-'+p.emp_id;
    const acc=((p.correct||0)+(p.wrong||0))>0?Math.round((p.correct||0)/((p.correct||0)+(p.wrong||0))*100):0;
    d.innerHTML=`
      <div class="lb-rn ${rnc}">${icon}</div>
      <div class="lb-av">${p.avatar||'🦁'}</div>
      <div class="lb-nm">
        <div class="lb-emp">${p.emp_id} ${p.finished?'<span class="lb-fin-badge">จบ</span>':''}</div>
        <div class="lb-sub">ถูก ${p.correct||0}/${QS_COUNT} · แม่นยำ ${acc}%</div>
      </div>
      <div class="lb-sc">${p.score}</div>
    `;
    el.appendChild(d);
  });
}

// ── PODIUM ──
function renderPodium(data){
  const finished=data.filter(d=>d.finished).sort((a,b)=>b.score-a.score);
  const strip=document.getElementById('podiumStrip');
  if(!finished.length){strip.className='podium-strip';return;}
  strip.className='podium-strip show';
  strip.innerHTML='<div style="font-size:11px;color:var(--gold);font-weight:700;flex-shrink:0;margin-right:4px">🏆 จบแล้ว:</div>';
  finished.slice(0,3).forEach((p,i)=>{
    const icons=['🥇','🥈','🥉'];
    const div=document.createElement('div');div.className='pod-item';
    div.innerHTML=`<span class="pod-num">${icons[i]||''}</span><span class="pod-av">${p.avatar||'🦁'}</span><div class="pod-info"><div class="pod-emp">${p.emp_id}</div><div class="pod-sc">${p.score} pts</div></div>`;
    strip.appendChild(div);
    if(i<Math.min(finished.length,3)-1){const sep=document.createElement('div');sep.className='pod-sep';strip.appendChild(sep);}
  });
  if(finished.length>3){
    const more=document.createElement('div');more.style.cssText='font-size:10px;color:rgba(255,255,255,.3);margin-left:8px';
    more.textContent=`+${finished.length-3} คน`;strip.appendChild(more);
  }
}

// ── CONFETTI ──
function checkConfetti(data){
  const finCount=data.filter(d=>d.finished).length;
  if(finCount>prevFinishedCount&&finCount>0){spawnConfetti();}
  prevFinishedCount=finCount;
}
function spawnConfetti(){
  const c=document.getElementById('confettiC');
  const colors=['#FFD700','#00C9FF','#FF6B35','#2ED573','#A855F7','#FF4757'];
  for(let i=0;i<60;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    const color=colors[Math.floor(Math.random()*colors.length)];
    const x=Math.random()*100;
    const dur=1.5+Math.random()*2;
    const delay=Math.random()*.8;
    const size=6+Math.random()*8;
    const shape=Math.random()>.5?'50%':'2px';
    p.style.cssText=`left:${x}%;background:${color};width:${size}px;height:${size}px;border-radius:${shape};animation-duration:${dur}s;animation-delay:${delay}s;`;
    c.appendChild(p);
    setTimeout(()=>p.remove(),(dur+delay)*1000+100);
  }
}

// ── RESET ──
async function confirmReset(){
  if(!confirm('⚠️ ล้างข้อมูลผู้เล่นทั้งหมด?\n\nการกระทำนี้ไม่สามารถย้อนกลับได้'))return;
  const{error}=await sb.from('game_results').delete().neq('emp_id','__placeholder__');
  if(!error){lastData=[];prevFinishedCount=0;refresh();}
  else alert('เกิดข้อผิดพลาด: '+error.message);
}

// ── TIME ──
function updateTime(){
  const now=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('bbTime').textContent='อัปเดตล่าสุด: '+now;
}

init();
setInterval(refresh,10000); // fallback refresh every 10s
</script>
